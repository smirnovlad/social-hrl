# Environment
env:
  name: "MiniGrid-KeyCorridorS3R2-v0"  # Start simpler, scale up
  max_steps: 500
  fully_observable: false  # partial observability (7x7 agent view)
  corridor_size: 11        # grid size for corridor-based tasks
  corridor_width: 3        # 1 for narrow (blocking/coordination), 3 for wide
  asymmetric_info: false   # in corridor social mode, agent 1 cannot see goal tiles

# Architecture
encoder:
  channels: [16, 32, 64]
  hidden_dim: 128

manager:
  goal_dim: 16
  hidden_dim: 128
  goal_period: 10  # c = manager acts every 10 steps
  use_option_critic: false  # learned termination instead of fixed period
  option_critic:
    num_options: 8
    termination_reg: 0.01   # regularize toward not terminating prematurely

worker:
  hidden_dim: 128
  intrinsic_reward_coef: 1.0
  extrinsic_reward_coef: 1.0
  intrinsic_anneal: false         # anneal intrinsic_reward_coef from initial to 0
  intrinsic_anneal_steps: 500000  # steps over which to anneal

communication:
  vocab_size: 10  # K
  message_length: 3  # L
  tau_start: 1.0  # Gumbel-Softmax temperature
  tau_end: 0.1
  tau_anneal_steps: 200000
  listener_reward_coef: 0.0  # reward agent for partner following its message
  ablation_mode: false       # zero out communication at eval time

# PPO
ppo:
  lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  num_envs: 8
  num_steps: 128  # steps per rollout
  num_minibatches: 4
  update_epochs: 4
  total_timesteps: 1000000
  anneal_lr: true

# SAC (alternative to TD3 for continuous manager)
sac:
  enabled: false
  lr: 0.0003
  alpha: 0.2            # initial entropy coefficient
  auto_alpha: true       # auto-tune entropy coefficient
  target_entropy: null   # null = -goal_dim (heuristic)
  tau: 0.005             # Polyak averaging
  buffer_size: 200000
  batch_size: 256
  warmup_steps: 1000

# Multi-agent
multi_agent:
  num_agents: 2
  shared_critic: true
  comm_reward_coef: 0.1  # bonus for successful coordination
  listener_reward_coef: 0.0  # reward for partner following message

# Transfer
transfer:
  freeze_manager: true
  freeze_comm: true
  freeze_encoder: true    # false = fine-tune encoder on target env
  freeze_worker: false    # worker always trainable

# Experiment
experiment:
  seed: 42
  device: "cuda"
  log_interval: 10
  save_interval: 100000
  eval_episodes: 20
  wandb_project: "social-hrl"
  wandb_entity: null
  output_dir: "outputs"
